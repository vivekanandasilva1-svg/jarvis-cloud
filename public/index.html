<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Klaus</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <svg class="login-logo" viewBox="0 0 220 240" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <radialGradient id="loginFaceGrad" cx="40%" cy="30%" r="75%">
            <stop offset="0%" stop-color="#fff8e6"/>
            <stop offset="45%" stop-color="#d4af37"/>
            <stop offset="100%" stop-color="#5a4a1e"/>
          </radialGradient>
        </defs>
        <path d="M110 30 C165 30 190 70 190 120 C190 175 155 210 110 210 C65 210 30 175 30 120 C30 70 55 30 110 30 Z" fill="url(#loginFaceGrad)"/>
        <path d="M55 105 C55 85 80 78 110 78 C140 78 165 85 165 105 C165 120 140 128 110 128 C80 128 55 120 55 105 Z" fill="#0a0a0a" opacity="0.9"/>
        <rect x="72" y="96" width="26" height="10" rx="5" fill="#f5f5f0"/>
        <rect x="122" y="96" width="26" height="10" rx="5" fill="#f5f5f0"/>
      </svg>
      <h1>Klaus</h1>
      <p>Digite a senha de acesso</p>
      <form id="loginForm">
        <input type="password" id="passwordInput" placeholder="Senha" autocomplete="current-password" />
        <button type="submit">Entrar</button>
      </form>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <div class="app-window" id="appWindow" hidden>
    <div class="window-titlebar">
      <span class="brand">K.L.A.U.S</span>
      <span class="online-pill"><span class="dot"></span>Online</span>
      <span class="clock" id="clock"></span>
      <span class="window-status" id="status">pronto</span>
      <button type="button" class="logout-btn" id="logoutBtn" title="Sair">Sair</button>
    </div>

    <div class="window-body">
      <div class="avatar-stage">
        <svg class="bot" id="bot" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="faceGrad" cx="42%" cy="24%" r="85%">
              <stop offset="0%" stop-color="#fdfaf2"/>
              <stop offset="35%" stop-color="#e9e6de"/>
              <stop offset="68%" stop-color="#c9ccd1"/>
              <stop offset="100%" stop-color="#4a4c50"/>
            </radialGradient>
            <linearGradient id="templeGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#3a3b3e"/>
              <stop offset="100%" stop-color="#0d0d0e"/>
            </linearGradient>
            <linearGradient id="eyeGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#fff8e6"/>
              <stop offset="100%" stop-color="#d4af37"/>
            </linearGradient>
            <radialGradient id="collarGrad" cx="50%" cy="0%" r="100%">
              <stop offset="0%" stop-color="#2a2a2a"/>
              <stop offset="100%" stop-color="#050505"/>
            </radialGradient>
            <filter id="glowSoft" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="2.4"/>
            </filter>
            <filter id="glowStrong" x="-120%" y="-120%" width="340%" height="340%">
              <feGaussianBlur stdDeviation="5"/>
            </filter>
          </defs>

          <!-- circuitos irradiando pro fundo, como um androide "aberto" pro mundo -->
          <g class="circuits-outer">
            <path class="circuit-trace gold" d="M112 186 L58 186 L58 132 L16 132"/>
            <path class="circuit-trace silver" d="M116 202 L76 228 L76 276 L34 298"/>
            <path class="circuit-trace gold" d="M128 148 L96 106 L96 62 L54 40"/>
            <path class="circuit-trace silver" d="M288 186 L342 186 L342 132 L384 132"/>
            <path class="circuit-trace gold" d="M284 202 L324 228 L324 276 L366 298"/>
            <path class="circuit-trace silver" d="M272 148 L304 106 L304 62 L346 40"/>
            <path class="circuit-trace gold" d="M150 302 L108 330 L108 368"/>
            <path class="circuit-trace silver" d="M250 302 L292 330 L292 368"/>

            <circle class="circuit-node gold" cx="58" cy="186" r="3.4"/>
            <circle class="circuit-node gold" cx="58" cy="132" r="3.4"/>
            <circle class="circuit-node gold" cx="16" cy="132" r="3.8"/>
            <circle class="circuit-node silver" cx="76" cy="228" r="3.4"/>
            <circle class="circuit-node silver" cx="76" cy="276" r="3.4"/>
            <circle class="circuit-node silver" cx="34" cy="298" r="3.8"/>
            <circle class="circuit-node gold" cx="96" cy="106" r="3.4"/>
            <circle class="circuit-node gold" cx="96" cy="62" r="3.4"/>
            <circle class="circuit-node gold" cx="54" cy="40" r="3.8"/>
            <circle class="circuit-node silver" cx="342" cy="186" r="3.4"/>
            <circle class="circuit-node silver" cx="342" cy="132" r="3.4"/>
            <circle class="circuit-node silver" cx="384" cy="132" r="3.8"/>
            <circle class="circuit-node gold" cx="324" cy="228" r="3.4"/>
            <circle class="circuit-node gold" cx="324" cy="276" r="3.4"/>
            <circle class="circuit-node gold" cx="366" cy="298" r="3.8"/>
            <circle class="circuit-node silver" cx="304" cy="106" r="3.4"/>
            <circle class="circuit-node silver" cx="304" cy="62" r="3.4"/>
            <circle class="circuit-node silver" cx="346" cy="40" r="3.8"/>
            <circle class="circuit-node gold" cx="108" cy="330" r="3.4"/>
            <circle class="circuit-node gold" cx="108" cy="368" r="3.8"/>
            <circle class="circuit-node silver" cx="292" cy="330" r="3.4"/>
            <circle class="circuit-node silver" cx="292" cy="368" r="3.8"/>
          </g>

          <!-- colar/ombros levemente cortados pela borda, so pra dar contexto de "meio-corpo" -->
          <path class="collar" d="M150 350 Q160 385 158 400 L242 400 Q240 385 250 350
            Q200 368 150 350 Z"/>
          <path class="collar-seam" d="M150 350 Q200 368 250 350"/>

          <!-- rosto: mascara simetrica em painel metalico -->
          <path class="face" d="M200,66
            C266,66 300,112 300,168
            C300,214 284,252 262,282
            C244,308 224,326 200,344
            C176,326 156,308 138,282
            C116,252 100,214 100,168
            C100,112 134,66 200,66 Z"/>

          <!-- placas de temporal (mais escuras), atras dos modulos de "ouvido" -->
          <path class="temple-panel" d="M100,150 C90,170 90,200 104,224 L118,214 C106,196 106,170 116,152 Z"/>
          <path class="temple-panel" d="M300,150 C310,170 310,200 296,224 L282,214 C294,196 294,170 284,152 Z"/>

          <!-- modulos auriculares, ponto de onde os circuitos "saem" do rosto -->
          <circle class="ear-module" cx="106" cy="188" r="15"/>
          <circle class="ear-ring" cx="106" cy="188" r="9.5"/>
          <circle class="ear-module" cx="294" cy="188" r="15"/>
          <circle class="ear-ring" cx="294" cy="188" r="9.5"/>

          <!-- costuras do painel facial -->
          <path class="seam" d="M200,70 L200,128"/>
          <rect class="seam-slot" x="192" y="68" width="16" height="9" rx="4"/>
          <path class="seam" d="M138,150 Q168,134 198,146"/>
          <path class="seam" d="M202,146 Q232,134 262,150"/>
          <path class="seam" d="M122,236 Q160,272 196,304"/>
          <path class="seam" d="M278,236 Q240,272 204,304"/>
          <path class="seam" d="M172,322 Q200,336 228,322"/>

          <!-- sombreado escultural: da volume ao painel plano -->
          <ellipse class="jaw-shade" cx="200" cy="292" rx="70" ry="30" filter="url(#glowSoft)"/>
          <ellipse class="cheek-highlight" cx="150" cy="140" rx="30" ry="42" filter="url(#glowSoft)"/>
          <ellipse class="cheek-highlight" cx="252" cy="140" rx="20" ry="30" filter="url(#glowSoft)"/>

          <!-- olhos: formato amendoado, brilho forte -->
          <g class="eye" id="eyeL">
            <path d="M140,190 C147,173 179,171 190,190 C179,207 147,207 140,190 Z"/>
            <path class="eye-glow" d="M140,190 C147,173 179,171 190,190 C179,207 147,207 140,190 Z" filter="url(#glowStrong)"/>
            <path class="eyelid" d="M142,182 Q166,170 189,182"/>
          </g>
          <g class="eye" id="eyeR">
            <path d="M210,190 C221,171 253,173 260,190 C253,207 221,207 210,190 Z"/>
            <path class="eye-glow" d="M210,190 C221,171 253,173 260,190 C253,207 221,207 210,190 Z" filter="url(#glowStrong)"/>
            <path class="eyelid" d="M211,182 Q234,170 258,182"/>
          </g>

          <!-- ponte do nariz, sutil -->
          <path class="nose" d="M200,208 L198,240 Q200,244 202,240 Z"/>
          <circle class="nose-light" cx="200" cy="241" r="1.8"/>

          <circle class="status-led gold" cx="118" cy="248" r="3"/>
          <circle class="status-led silver" cx="282" cy="248" r="3"/>

          <!-- boca: labios fechados em repouso, abrem de verdade com o audio -->
          <rect class="mouth-cavity" x="176" y="270" width="48" height="20" rx="9"/>
          <path class="lip-line lip-top" d="M172,278 Q200,270 228,278"/>
          <path class="lip-line lip-bottom" d="M172,282 Q200,292 228,282"/>
          <g class="mouth" id="mouth">
            <rect class="bar" x="180" y="272" width="8" height="16" rx="3"/>
            <rect class="bar" x="192" y="272" width="8" height="16" rx="3"/>
            <rect class="bar" x="204" y="272" width="8" height="16" rx="3"/>
            <rect class="bar" x="216" y="272" width="8" height="16" rx="3"/>
          </g>
        </svg>
        <div class="hint" id="hint">Aperte o microfone ou digite abaixo</div>
      </div>

      <div class="chat-panel">
        <div class="chat-log-header">
          <span>Conversa</span>
          <div class="chat-log-actions">
            <button type="button" id="clearBtn">Limpar</button>
            <button type="button" id="extractBtn">Exportar</button>
          </div>
        </div>
        <div class="chat-log" id="chatLog"></div>

        <div class="attach-preview" id="attachPreview" hidden></div>

        <form class="composer" id="composer">
          <button type="button" class="icon-btn attach-btn" id="attachBtn" title="Anexar imagem, audio ou video">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M16.5 6.5v10a4.5 4.5 0 0 1-9 0V5a3 3 0 0 1 6 0v9.5a1.5 1.5 0 0 1-3 0V7H9v7.5a3 3 0 0 0 6 0V5a4.5 4.5 0 0 0-9 0v11.5a6 6 0 0 0 12 0v-10h-1.5z"/></svg>
          </button>
          <input type="file" id="fileInput" accept="image/*,audio/*,video/*" multiple hidden />
          <button type="button" class="icon-btn mic-btn" id="micBtn" title="Falar um comando">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
          </button>
          <button type="button" class="icon-btn conv-btn" id="convBtn" title="Ativar modo conversa continua">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 3a2 2 0 0 0-2 2v10a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zM6 11a1 1 0 0 1 2 0v2a1 1 0 0 1-2 0v-2zm10 0a1 1 0 0 1 2 0v2a1 1 0 0 1-2 0v-2z"/></svg>
          </button>
          <input type="text" id="textInput" placeholder="Fale com o Klaus..." autocomplete="off" />
          <button type="submit" class="send-btn" id="sendBtn">Enviar</button>
          <button type="button" class="icon-btn mute-btn" id="muteBtn" title="Silenciar voz">🔊</button>
        </form>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
