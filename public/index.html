<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05070d" />
  <title>Jarvis</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="icon" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <div class="login-orb"></div>
      <h1>Jarvis</h1>
      <p>Digite a senha de acesso</p>
      <form id="loginForm">
        <input type="password" id="passwordInput" placeholder="Senha" autocomplete="current-password" />
        <button type="submit">Entrar</button>
      </form>
      <p class="login-error" id="loginError"></p>
    </div>
  </div>

  <div class="app-window" id="appWindow" hidden>
    <div class="window-titlebar">
      <span class="dot"></span>
      <span class="window-title">Jarvis</span>
      <span class="window-status" id="status">pronto</span>
    </div>

    <div class="window-body">
      <div class="orb-stage">
        <div class="orb" id="orb">
          <div class="orb-core"></div>
          <div class="orb-ring ring-1"></div>
          <div class="orb-ring ring-2"></div>
          <div class="orb-ring ring-3"></div>
        </div>
        <div class="hint">Aperte o microfone ou digite abaixo</div>
      </div>

      <div class="chat-panel">
        <div class="chat-log" id="chatLog"></div>

        <form class="composer" id="composer">
          <button type="button" class="mic-btn" id="micBtn" title="Falar">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3zm5-3a5 5 0 0 1-10 0H5a7 7 0 0 0 6 6.92V21h2v-3.08A7 7 0 0 0 19 11h-2z"/></svg>
          </button>
          <input type="text" id="textInput" placeholder="Fale com o Jarvis..." autocomplete="off" />
          <button type="submit" class="send-btn" id="sendBtn">Enviar</button>
          <button type="button" class="mute-btn" id="muteBtn" title="Silenciar voz">🔊</button>
        </form>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
