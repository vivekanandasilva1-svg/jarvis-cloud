services:
  - type: web
    name: jarvis-cloud
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: META_ADS_TOKENS
        sync: false
      - key: CLINICORP_API_USER
        sync: false
      - key: CLINICORP_API_TOKEN
        sync: false
      - key: CLINICORP_SUBSCRIBER_ID
        sync: false
      - key: CLINICORP_DEFAULT_BUSINESS_ID
        sync: false
      - key: CLINICORP_CODE_LINK
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_ALLOWED_NUMBERS
        sync: false
